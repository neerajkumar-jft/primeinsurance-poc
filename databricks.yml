# Databricks Asset Bundle configuration for PrimeInsurance Data Intelligence Platform
#
# Deploy:   databricks bundle deploy --target dev
# Run:      databricks bundle run primeins_end_to_end --target dev
# Destroy:  databricks bundle destroy --target dev
#
# To migrate to a new workspace (commercial account):
#   1. Update the host and catalog in the prod target
#   2. Run: databricks bundle deploy --target prod
#   3. Everything deploys automatically — pipelines, jobs, permissions

bundle:
  name: primeinsurance-poc

variables:
  catalog:
    description: Unity Catalog name for all tables
    default: primeins
  warehouse_id:
    description: SQL Warehouse ID for serving
    default: 0506e893342cdfbe

# ============================================================
# DLT PIPELINES
# ============================================================

resources:
  pipelines:
    bronze_pipeline:
      name: primeins_bronze_pipeline
      catalog: ${var.catalog}
      target: bronze
      channel: CURRENT
      development: true
      continuous: false
      libraries:
        - notebook:
            path: ./notebooks/bronze/01_bronze_ingestion_dlt.py

    silver_pipeline:
      name: primeins_silver_pipeline
      catalog: ${var.catalog}
      target: silver
      channel: CURRENT
      development: true
      continuous: false
      libraries:
        - notebook:
            path: ./notebooks/silver/02_silver_dlt_pipeline.py

    gold_pipeline:
      name: primeins_gold_pipeline
      catalog: ${var.catalog}
      target: gold
      channel: CURRENT
      development: true
      continuous: false
      libraries:
        - notebook:
            path: ./notebooks/gold/03_gold_dlt_pipeline.py

  # ============================================================
  # WORKFLOW JOBS
  # ============================================================

  jobs:
    primeins_end_to_end:
      name: PrimeInsurance_End_to_End_Pipeline
      tags:
        project: primeinsurance-poc
        team: jellyfish-technologies
      tasks:
        - task_key: bronze_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.bronze_pipeline.id}
            full_refresh: false

        - task_key: silver_pipeline
          depends_on:
            - task_key: bronze_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.silver_pipeline.id}
            full_refresh: false

        - task_key: gold_pipeline
          depends_on:
            - task_key: silver_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.gold_pipeline.id}
            full_refresh: false

        - task_key: uc1_dq_explainer
          depends_on:
            - task_key: silver_pipeline
          notebook_task:
            notebook_path: ./notebooks/genai/04_uc1_dq_explanations.py
            base_parameters:
              catalog: ${var.catalog}
            source: WORKSPACE

        - task_key: uc2_anomaly_engine
          depends_on:
            - task_key: silver_pipeline
          notebook_task:
            notebook_path: ./notebooks/genai/04_uc2_anomaly_engine.py
            base_parameters:
              catalog: ${var.catalog}
            source: WORKSPACE

        - task_key: uc3_rag_policy
          depends_on:
            - task_key: gold_pipeline
          notebook_task:
            notebook_path: ./notebooks/genai/04_uc3_policy_rag.py
            base_parameters:
              catalog: ${var.catalog}
              run_test_queries: "false"
            source: WORKSPACE

        - task_key: uc4_executive_insights
          depends_on:
            - task_key: gold_pipeline
          notebook_task:
            notebook_path: ./notebooks/genai/04_uc4_executive_insights.py
            base_parameters:
              catalog: ${var.catalog}
            source: WORKSPACE

        - task_key: vector_store_sync
          depends_on:
            - task_key: gold_pipeline
          notebook_task:
            notebook_path: ./notebooks/genai/05_uc3_vector_store_sync.py
            base_parameters:
              catalog: ${var.catalog}
            source: WORKSPACE

    # ── Standalone report & analysis notebooks ──

    regulatory_customer_report:
      name: PrimeInsurance_Regulatory_Report
      tags:
        project: primeinsurance-poc
      tasks:
        - task_key: regulatory_report
          notebook_task:
            notebook_path: ./notebooks/gold/07_regulatory_customer_report.py
            source: WORKSPACE

    executive_dashboard:
      name: PrimeInsurance_Executive_Dashboard
      tags:
        project: primeinsurance-poc
      tasks:
        - task_key: dashboard
          notebook_task:
            notebook_path: ./notebooks/gold/05_executive_dashboard.py
            source: WORKSPACE

    before_after_comparison:
      name: PrimeInsurance_Before_After
      tags:
        project: primeinsurance-poc
      tasks:
        - task_key: comparison
          notebook_task:
            notebook_path: ./notebooks/gold/06_before_after_comparison.py
            source: WORKSPACE

    claims_sla_monitoring:
      name: PrimeInsurance_Claims_SLA_Monitoring
      tags:
        project: primeinsurance-poc
      tasks:
        - task_key: sla_monitoring
          notebook_task:
            notebook_path: ./notebooks/gold/08_claims_sla_monitoring.py
            source: WORKSPACE

    inventory_redistribution:
      name: PrimeInsurance_Inventory_Redistribution
      tags:
        project: primeinsurance-poc
      tasks:
        - task_key: redistribution
          notebook_task:
            notebook_path: ./notebooks/gold/09_inventory_redistribution.py
            source: WORKSPACE

    customer_risk_segmentation:
      name: PrimeInsurance_Customer_Risk_Segmentation
      tags:
        project: primeinsurance-poc
      tasks:
        - task_key: risk_segmentation
          notebook_task:
            notebook_path: ./notebooks/gold/10_customer_risk_segmentation.py
            source: WORKSPACE

    vector_store_setup:
      name: PrimeInsurance_Vector_Store_Setup
      tags:
        project: primeinsurance-poc
        run: once
      tasks:
        - task_key: vs_setup
          notebook_task:
            notebook_path: ./notebooks/genai/05_uc3_vector_store_setup.py
            base_parameters:
              catalog: ${var.catalog}
            source: WORKSPACE

    vector_search_pipeline:
      name: PrimeInsurance_Vector_Search_Pipeline
      tags:
        project: primeinsurance-poc
        approach: vector-search
      tasks:
        - task_key: gold_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.gold_pipeline.id}
            full_refresh: false

        - task_key: vector_store_sync
          depends_on:
            - task_key: gold_pipeline
          notebook_task:
            notebook_path: ./notebooks/genai/05_uc3_vector_store_sync.py
            base_parameters:
              catalog: ${var.catalog}
            source: WORKSPACE

        - task_key: vector_search_inference
          depends_on:
            - task_key: vector_store_sync
          notebook_task:
            notebook_path: ./notebooks/genai/05_uc3_vector_search_inference.py
            base_parameters:
              catalog: ${var.catalog}
            source: WORKSPACE

    # ── Phase 1.5 quality resolution loop ──

    quality_resolution_logger_setup:
      name: PrimeInsurance_Quality_Resolution_Logger_Setup
      tags:
        project: primeinsurance-poc
        phase: "1.5"
        run: once
      tasks:
        - task_key: setup
          notebook_task:
            notebook_path: ./notebooks/quality/36_dq_resolution_logger.py
            base_parameters:
              catalog: ${var.catalog}
            source: WORKSPACE

    quality_trend_alerting:
      name: PrimeInsurance_Quality_Trend_Alerting
      tags:
        project: primeinsurance-poc
        phase: "1.5"
      tasks:
        - task_key: trend_alerting
          notebook_task:
            notebook_path: ./notebooks/quality/30_dq_trend_alerting.py
            base_parameters:
              catalog: ${var.catalog}
              threshold: "2.0"
              comparison_lookback_days: "7"
              min_records_floor: "10"
            source: WORKSPACE

    quality_volume_cap_check:
      name: PrimeInsurance_Quality_Volume_Cap_Check
      tags:
        project: primeinsurance-poc
        phase: "1.5"
      tasks:
        - task_key: volume_cap_check
          notebook_task:
            notebook_path: ./notebooks/quality/31_dq_volume_cap_check.py
            base_parameters:
              catalog: ${var.catalog}
              default_threshold_pct: "5.0"
              per_table_thresholds: "sales=70.0"
              exclude_tables: ""
              halt_on_breach: "true"
            source: WORKSPACE

    quality_metrics_rollup:
      name: PrimeInsurance_Quality_Metrics_Rollup
      tags:
        project: primeinsurance-poc
        phase: "1.5"
      tasks:
        - task_key: metrics_rollup
          notebook_task:
            notebook_path: ./notebooks/quality/37_dq_metrics_rollup.py
            base_parameters:
              catalog: ${var.catalog}
            source: WORKSPACE

    quality_steward_review:
      name: PrimeInsurance_Quality_Steward_Review
      tags:
        project: primeinsurance-poc
        phase: "1.5"
        run: manual
      tasks:
        - task_key: steward_review
          notebook_task:
            notebook_path: ./notebooks/quality/34_dq_steward_review.py
            base_parameters:
              catalog: ${var.catalog}
              steward_email: ""
            source: WORKSPACE

# ============================================================
# DEPLOYMENT TARGETS
# ============================================================

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-095b6263-cfd6.cloud.databricks.com
    variables:
      catalog: primeins
      warehouse_id: 0506e893342cdfbe

  prod:
    mode: production
    workspace:
      host: ${DATABRICKS_PROD_HOST}
    variables:
      catalog: primeins_prod
      warehouse_id: ${DATABRICKS_PROD_WAREHOUSE}
    run_as:
      service_principal_name: ${DATABRICKS_PROD_SP}
